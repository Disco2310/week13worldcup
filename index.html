<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>16-Team Tournament Tracker</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header class="header">
      <div class="header__inner">
        <div class="brand">
          <img id="brandLogo" class="brand__logo" alt="" />
          <h1 class="title">The ClioSoF Week 13 World Cup</h1>
        </div>
        <div class="header__actions">
          <button id="btnOwnerMode" class="btn btn--ghost" type="button" title="Unlock edit mode">Owner mode</button>
          <button id="btnResetAll" class="btn btn--ghost" type="button" title="Clear teams + bracket" data-owner-only>Reset</button>
          <button id="btnShare" class="btn btn--ghost" type="button" title="Copy a share link">Copy link</button>
        </div>
      </div>
    </header>

    <main class="container">
      <section class="card" id="teamsCard" data-owner-only>
        <div class="card__header">
          <h2>Teams</h2>
          <div class="card__actions">
            <button id="btnToggleTeams" class="btn btn--ghost" type="button" aria-expanded="true">Minimise</button>
            <button id="btnFillExample" class="btn btn--ghost" type="button">Fill example</button>
            <button id="btnShuffleSeed" class="btn btn--ghost" type="button">Shuffle seeding</button>
            <button id="btnGenerate" class="btn" type="button">Generate bracket</button>
          </div>
        </div>

        <div class="teams">
          <div class="teams__grid" id="teamsGrid" aria-label="Team inputs"></div>
          <div class="hint">
            Tip: You can also paste a list (one team per line) into any box.
          </div>
        </div>
      </section>

      <section class="bracket">
        <div class="bracket__col">
          <div class="round__header">
            <h3>Round of 16</h3>
            <div class="round__meta" id="metaR16">8 matches</div>
          </div>
          <div id="roundR16" class="round" aria-label="Round of 16"></div>
        </div>

        <div class="bracket__col">
          <div class="round__header">
            <h3>Quarter-finals</h3>
            <div class="round__meta" id="metaQF">4 matches</div>
          </div>
          <div id="roundQF" class="round" aria-label="Quarter-finals"></div>
        </div>

        <div class="bracket__col">
          <div class="round__header">
            <h3>Semi-finals</h3>
            <div class="round__meta" id="metaSF">2 matches</div>
          </div>
          <div id="roundSF" class="round" aria-label="Semi-finals"></div>
        </div>

        <div class="bracket__col">
          <div class="round__header">
            <h3>Final</h3>
            <div class="round__meta" id="metaF">1 match</div>
          </div>
          <div id="roundF" class="round" aria-label="Final"></div>
        </div>

        <aside class="bracket__champ">
          <div class="champ card">
            <div class="card__header">
              <h2>Champion</h2>
            </div>
            <div class="champ__body">
              <div id="championBadge" class="badge badge--empty">—</div>
              <div class="champ__actions">
                <button id="btnResetWinners" class="btn btn--ghost" type="button">Reset winners</button>
              </div>
              <div class="hint">
                Pick winners in each match to advance them.
              </div>
            </div>
          </div>
        </aside>
      </section>
    </main>

    <footer class="footer">
      <div class="footer__inner">
        <span></span>
      </div>
    </footer>

    <template id="matchTemplate">
      <div class="match">
        <div class="match__teams">
          <button class="teamBtn teamBtn--home" type="button" data-side="0" data-owner-disable>
            <span class="teamBtn__name">Team A</span>
          </button>
          <div class="match__vs">vs</div>
          <button class="teamBtn teamBtn--away" type="button" data-side="1" data-owner-disable>
            <span class="teamBtn__name">Team B</span>
          </button>
        </div>
        <div class="match__footer">
          <div class="match__status" data-role="status">Pick winner</div>
          <button class="linkBtn" type="button" data-role="clear" data-owner-only>Clear</button>
        </div>
      </div>
    </template>

    <script src="./script.js" defer></script>
  </body>
</html>
